name = "mailfree"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars = true
workers_dev = false
preview_urls = false

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db" #你的d1数据库名称
database_id = "dd134a58-25c0-4495-934b-d5be861be889" # 你的database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
MAILBOX_EXPIRE_HOURS = "1"
MAILBOX_TOMBSTONE_HOURS = "24"
MAILBOX_CLEANUP_BATCH_SIZE = "100"
# 建议将非敏感配置直接写入这里，例如：
# MAIL_DOMAIN = "mail.example.com"
# FORWARD_RULES = '[{"prefix":"vip","email":"a@example.com"}]'
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"2141083706@qq.com"}]"

[triggers]
crons = ["0 * * * *"]


# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# R2 存储桶绑定（用于保存完整 EML 内容）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mail-eml"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

